<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <radialGradient id="gold-grad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e5c185" />
      <stop offset="100%" stop-color="#c69a53" />
    </radialGradient>
  </defs>
  <!-- Sleek dark background circle -->
  <circle cx="256" cy="256" r="240" fill="#111111" stroke="url(#gold-grad)" stroke-width="12"/>
  
  <!-- Minimalist YB Monogram in Playfair Display / Georgia Serif style -->
  <text x="256" y="295" font-family="'Playfair Display', 'Georgia', serif" font-size="190" font-weight="bold" fill="url(#gold-grad)" text-anchor="middle" letter-spacing="-5">YB</text>
  
  <!-- Subtle gold accent circle -->
  <circle cx="256" cy="256" r="160" fill="none" stroke="url(#gold-grad)" stroke-width="3" stroke-dasharray="10 15" opacity="0.6"/>
</svg>
